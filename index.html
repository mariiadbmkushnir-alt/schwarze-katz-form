<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vauna und Vlora - Event Anfrage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #FFD700 0%, #FFC700 50%, #1E90FF 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #FFD700 0%, #FFC700 50%, #1E90FF 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .header p {
            font-size: 13px;
            opacity: 0.95;
            font-weight: 500;
        }
        
        form {
            padding: 25px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 18px;
        }
        
        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #1E90FF;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="date"],
        input[type="time"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 11px;
            border: 2px solid #FFD700;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
            background: #fafafa;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1E90FF;
            background: white;
            box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.1);
        }
        
        textarea {
            min-height: 70px;
            resize: vertical;
        }
        
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: white;
            background: linear-gradient(90deg, #FFD700, #1E90FF);
            padding: 12px 15px;
            margin: 20px -25px 15px -25px;
            border-radius: 0;
        }
        
        .checkbox-group,
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
            border-left: 3px solid #FFD700;
        }
        
        .checkbox-item,
        .radio-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .checkbox-item input,
        .radio-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #FFD700;
        }
        
        .checkbox-item label,
        .radio-item label {
            margin-bottom: 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: normal;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 25px;
        }
        
        button {
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #FFD700 0%, #FFC700 100%);
            color: #1E90FF;
            grid-column: span 2;
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }
        
        .btn-reset {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        
        .btn-reset:hover {
            background: #e8e8e8;
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 16px;
            border: 1px solid #c3e6cb;
            font-weight: 600;
        }
        
        .success-message.show {
            display: block;
        }
        
        .required {
            color: #dc3545;
        }
        
        .help-text {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            font-style: italic;
        }
        
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                grid-template-columns: 1fr;
            }
            
            .btn-submit {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>VAUNA UND VLORA</h1>
            <p>Event Anfrage</p>
        </div>

        <form action="https://formspree.io/f/xvznrvke" method="POST">
            <div class="success-message" id="successMsg">
                ✓ Anfrage erfolgreich versendet!
            </div>

            <!-- Kundenangaben -->
            <div class="section-title">👤 Kundenangaben</div>
            
            <div class="form-group">
                <label for="name">Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="Max Mustermann" required>
            </div>

            <div class="form-group">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="kunde@example.de" required>
            </div>

            <div class="form-group">
                <label for="adresse">Adresse</label>
                <input type="text" id="adresse" name="adresse" placeholder="Straße, Hausnummer, Stadt">
            </div>

            <!-- Veranstaltungsdetails -->
            <div class="section-title">📅 Veranstaltungsdetails</div>

            <div class="form-row">
                <div class="form-group">
                    <label for="datum">Datum <span class="required">*</span></label>
                    <input type="date" id="datum" name="datum" required>
                </div>
                <div class="form-group">
                    <label for="uhrzeit">Uhrzeit</label>
                    <input type="time" id="uhrzeit" name="uhrzeit">
                </div>
            </div>

            <div class="form-group">
                <label for="anlass">Anlass <span class="required">*</span></label>
                <input type="text" id="anlass" name="anlass" placeholder="Hochzeit, Firmenevent, etc." required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="ort">Ort <span class="required">*</span></label>
                    <input type="text" id="ort" name="ort" placeholder="Location" required>
                </div>
                <div class="form-group">
                    <label for="personenanzahl">Personenanzahl <span class="required">*</span></label>
                    <input type="number" id="personenanzahl" name="personenanzahl" min="1" value="50" required>
                </div>
            </div>

            <div class="form-group">
                <label for="exklusiv">Exklusiv/Bereich</label>
                <input type="text" id="exklusiv" name="exklusiv" placeholder="z.B. Gesamte Location, nur Saal">
            </div>

            <!-- Speisenangebot -->
            <div class="section-title">🍽️ Speisenangebot</div>

            <div class="form-group">
                <label>Art der Verpflegung</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="menu" name="speisen" value="Menü">
                        <label for="menu">Menü</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="flying" name="speisen" value="Flying">
                        <label for="flying">Flying (Cocktail-Party)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="buffet" name="speisen" value="Buffet">
                        <label for="buffet">Buffet</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="alacarte" name="speisen" value="A la carte">
                        <label for="alacarte">À la carte</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="vegetarier">Vegetarier</label>
                    <input type="number" id="vegetarier" name="vegetarier" value="0" min="0">
                </div>
                <div class="form-group">
                    <label for="veganer">Veganer</label>
                    <input type="number" id="veganer" name="veganer" value="0" min="0">
                </div>
            </div>

            <div class="form-group">
                <label for="unvertraeglichkeiten">Unverträglichkeiten</label>
                <textarea id="unvertraeglichkeiten" name="unvertraeglichkeiten" placeholder="Allergien, Diäten, Besonderheiten..."></textarea>
            </div>

            <div class="form-group">
                <label for="menue">Menü Details</label>
                <textarea id="menue" name="menue" placeholder="Kursbeschreibung, Speisen, Getränke..."></textarea>
            </div>

            <!-- Getränke -->
            <div class="section-title">🍷 Getränke</div>

            <div class="form-group">
                <label for="getraenke">Getränkewünsche</label>
                <textarea id="getraenke" name="getraenke" placeholder="Bier, Wein, Sekt, Softdrinks..."></textarea>
            </div>

            <!-- Zahlungsbedingungen -->
            <div class="section-title">💰 Zahlungsbedingungen</div>

            <div class="form-group">
                <label>Bezahlung</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="ganz_gastgeber" name="bezahlung" value="Komplett auf Gastgeber">
                        <label for="ganz_gastgeber">Komplett auf Gastgeber</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="selbstzahler" name="bezahlung" value="Selbstzahler">
                        <label for="selbstzahler">Selbstzahler</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="gemischt" name="bezahlung" value="Gemischt (teilweise Gastgeber)">
                        <label for="gemischt">Gemischt (teilweise Gastgeber)</label>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="mindestumsatz">Mindestumsatz (€)</label>
                    <input type="number" id="mindestumsatz" name="mindestumsatz" value="2000" min="0">
                </div>
                <div class="form-group">
                    <label for="betrag">Betrag auf Gastgeber (€)</label>
                    <input type="number" id="betrag" name="betrag" min="0">
                </div>
            </div>

            <div class="form-group">
                <label>Rechnung</label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" id="bar" name="rechnung" value="Bar vor Ort">
                        <label for="bar">Bar vor Ort</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="ec" name="rechnung" value="EC Karte vor Ort">
                        <label for="ec">EC Karte vor Ort</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" id="rechnung" name="rechnung" value="Auf Rechnung">
                        <label for="rechnung">Auf Rechnung</label>
                    </div>
                </div>
            </div>

            <!-- Organisation -->
            <div class="section-title">🎯 Organisation</div>

            <div class="form-group">
                <label for="tischanordnung">Tischanordnung</label>
                <input type="text" id="tischanordnung" name="tischanordnung" placeholder="z.B. Bankett, U-Form, Cocktail">
            </div>

            <div class="form-group">
                <label for="deko">Dekoration</label>
                <input type="text" id="deko" name="deko" placeholder="Wünsche zur Dekoration">
            </div>

            <div class="form-group">
                <label for="ablauf">Ablauf / Zeitplan</label>
                <textarea id="ablauf" name="ablauf" placeholder="Beschreibung des geplanten Ablaufs..."></textarea>
            </div>

            <!-- Anmerkungen -->
            <div class="section-title">📝 Anmerkungen</div>

            <div class="form-group">
                <label for="anmerkungen">Sonstige Anmerkungen / Besondere Wünsche</label>
                <textarea id="anmerkungen" name="anmerkungen" placeholder="Hier können Sie zusätzliche Informationen hinzufügen..."></textarea>
                <div class="help-text">Dieses Feld können Sie nach Bedarf ausfüllen - für Ihre Notizen oder Besonderheiten</div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" class="btn-submit">📧 Anfrage senden</button>
                <button type="reset" class="btn-reset">Zurücksetzen</button>
            </div>
        </form>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            setTimeout(() => {
                document.getElementById('successMsg').classList.add('show');
            }, 1000);
        });
    </script>
</body>
</html>
