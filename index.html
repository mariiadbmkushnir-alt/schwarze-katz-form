<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schwarze Katz - Event Angebot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1F4E78 0%, #2E75B6 100%);
            min-height: 100vh;
            padding: 10px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1F4E78 0%, #2E75B6 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        form {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1F4E78;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2E75B6;
            box-shadow: 0 0 0 3px rgba(46, 117, 182, 0.1);
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1F4E78;
            margin: 20px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #E7F0F6;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        
        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 16px;
            border: 1px solid #c3e6cb;
        }
        
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SCHWARZE KATZ</h1>
            <p>Schnell-Angebot erstellen</p>
        </div>

        <form action="https://formspree.io/f/xvznrvke" method="POST">
            <div class="success-message" id="successMsg">
                ✓ Angebot erfolgreich versendet!
            </div>

            <!-- Kundenangaben -->
            <div class="section-title">👤 Kundenangaben</div>
            
            <div class="form-group">
                <label for="kundenname">Kundenname *</label>
                <input type="text" id="kundenname" name="kundenname" placeholder="z.B. Max Mustermann" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="kunde@example.de" required>
            </div>

            <div class="form-group">
                <label for="adresse">Adresse</label>
                <input type="text" id="adresse" name="adresse" placeholder="Straße, Hausnummer, Stadt">
            </div>

            <div class="form-group">
                <label for="telefon">Telefon</label>
                <input type="text" id="telefon" name="telefon" placeholder="+49 123 45678">
            </div>

            <!-- Veranstaltungsdetails -->
            <div class="section-title">📅 Veranstaltungsdetails</div>

            <div class="form-group">
                <label for="anlass">Anlass *</label>
                <input type="text" id="anlass" name="anlass" placeholder="z.B. Hochzeit, Firmenevent" required>
            </div>

            <div class="form-group">
                <label for="datum">Datum *</label>
                <input type="date" id="datum" name="datum" required>
            </div>

            <div class="form-group">
                <label for="uhrzeit">Uhrzeit</label>
                <input type="time" id="uhrzeit" name="uhrzeit">
            </div>

            <div class="form-group">
                <label for="ort">Ort/Location *</label>
                <input type="text" id="ort" name="ort" placeholder="Restaurant, Hotel, etc." required>
            </div>

            <div class="form-group">
                <label for="personenanzahl">Anzahl Personen *</label>
                <input type="number" id="personenanzahl" name="personenanzahl" value="50" min="1" required>
            </div>

            <div class="form-group">
                <label for="mindestumsatz">Mindestumsatz (€)</label>
                <input type="number" id="mindestumsatz" name="mindestumsatz" value="2000" min="0">
            </div>

            <!-- Speisenangebot -->
            <div class="section-title">🍽️ Speisenangebot</div>

            <div class="form-group">
                <label for="speisen">Art der Verpflegung</label>
                <input type="text" id="speisen" name="speisen" placeholder="z.B. Menü, Buffet, Flying">
            </div>

            <div class="form-group">
                <label for="vegetarier">Vegetarier</label>
                <input type="number" id="vegetarier" name="vegetarier" value="0" min="0">
            </div>

            <div class="form-group">
                <label for="veganer">Veganer</label>
                <input type="number" id="veganer" name="veganer" value="0" min="0">
            </div>

            <div class="form-group">
                <label for="allergien">Allergien/Spezialwünsche</label>
                <textarea id="allergien" name="allergien" placeholder="z.B. Nussallergie, glutenfrei..." style="min-height: 80px;"></textarea>
            </div>

            <!-- Zahlungsbedingungen -->
            <div class="section-title">💰 Zahlungsbedingungen</div>

            <div class="form-group">
                <label for="zahlungsart">Zahlungsart</label>
                <select id="zahlungsart" name="zahlungsart">
                    <option>Komplette Bezahlung im Voraus</option>
                    <option>50% Anzahlung, 50% nach Event</option>
                    <option>Gesamtzahlung nach Event</option>
                </select>
            </div>

            <button type="submit">📧 Angebot senden</button>
        </form>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            // Formspree kümmert sich um den Submit
            // Wir zeigen einfach eine Erfolgsmeldung
            setTimeout(() => {
                document.getElementById('successMsg').classList.add('show');
            }, 1000);
        });
    </script>
</body>
</html>
